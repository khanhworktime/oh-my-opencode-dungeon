services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Optional: MySQL (leave unset to run without a database)
      # DATABASE_URL: mysql://user:password@db:3306/claude_dungeon
    volumes:
      # Persists API key and event history across container restarts
      - dungeon-data:/home/dungeon/.claude-dungeon
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/bridge/key"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dungeon-data:
